<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#007AFF" />
    <meta name="description" content="旧聊 Web - 轻量在线聊天" />
    <title>旧聊 Web</title>
    <link rel="stylesheet" href="/app-assets/app.css" />
    <style>
      /* Additional optimized styles */
      .loading {
        text-align: center;
        padding: 40px;
        color: #999;
      }
      .error {
        text-align: center;
        padding: 40px;
        color: #d84c4c;
      }
      .date-separator {
        text-align: center;
        padding: 10px 0;
        color: #999;
        font-size: 12px;
        position: relative;
      }
      .date-separator::before,
      .date-separator::after {
        content: '';
        position: absolute;
        top: 50%;
        width: 30%;
        height: 1px;
        background: #e0e0e0;
      }
      .date-separator::before { left: 5%; }
      .date-separator::after { right: 5%; }
      .message-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 14px;
        font-weight: bold;
        margin-right: 8px;
        flex-shrink: 0;
      }
      .message-bubble {
        max-width: 70%;
        padding: 10px 14px;
        border-radius: 18px;
        background: #f0f0f0;
        word-wrap: break-word;
      }
      .message.me .message-bubble {
        background: #007AFF;
        color: white;
      }
      .message-image {
        max-width: 200px;
        max-height: 200px;
        border-radius: 8px;
        cursor: pointer;
      }
      .message-file {
        display: inline-flex;
        align-items: center;
        padding: 8px 12px;
        background: rgba(0,0,0,0.05);
        border-radius: 8px;
        text-decoration: none;
        color: inherit;
      }
      .message.pending .message-bubble {
        opacity: 0.6;
      }
      .message.failed .message-bubble {
        background: #ffe5e5;
        border: 1px solid #d84c4c;
      }
      mark {
        background: #ffeb3b;
        padding: 0 2px;
        border-radius: 2px;
      }
      [data-theme="dark"] {
        filter: invert(1) hue-rotate(180deg);
      }
      [data-theme="dark"] img,
      [data-theme="dark"] .message-avatar,
      [data-theme="dark"] .message-bubble {
        filter: invert(1) hue-rotate(180deg);
      }
      /* Mobile optimizations */
      @media (max-width: 768px) {
        .app[data-panel="chat"] .sidebar {
          display: none;
        }
        .app[data-panel="list"] .conversation {
          display: none;
        }
        .list-item {
          padding: 12px 16px;
        }
      }
      /* Scrollbar styling */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #ccc;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #aaa;
      }
    </style>
  </head>
  <body>
    <div id="app" class="app" data-view="chats" data-panel="list">
      <div class="app-bg"></div>
      <header class="topbar">
        <div class="brand">
          <img src="/landing-assets/oldchat_logo.png" alt="旧聊" />
          <div>
            <div class="brand-title">旧聊</div>
            <div class="brand-subtitle">OldChat Web</div>
          </div>
        </div>
        <div class="top-actions">
          <div class="status-pill" id="statusPill" title="连接状态">离线</div>
          <div class="user-pill" id="userPill" title="当前用户">未登录</div>
          <button class="ghost" id="btnLogout" title="退出登录 (Ctrl+Shift+Q)">退出</button>
        </div>
      </header>

      <main class="layout">
        <aside class="sidebar" id="sidebar">
          <div class="sidebar-head">
            <div class="search">
              <input 
                id="searchInput" 
                placeholder="搜索好友或群组 (Ctrl+K)" 
                autocomplete="off"
                autocapitalize="off"
              />
            </div>
            <div class="tabs">
              <button class="tab active" data-view="chats" title="私聊">聊天</button>
              <button class="tab" data-view="groups" title="群组">群组</button>
            </div>
          </div>
          <div class="list" id="listView"></div>
        </aside>

        <section class="conversation" id="conversation">
          <div class="conversation-head">
            <button class="ghost mini" id="btnBackList" title="返回列表 (Esc)">← 列表</button>
            <div>
              <div class="conversation-title" id="conversationTitle">旧聊 Web</div>
              <div class="conversation-meta" id="conversationMeta">选择一个会话开始聊天</div>
            </div>
          </div>
          <div class="messages" id="messageList"></div>
          <div class="empty" id="emptyState">
            <div class="empty-title">还没有打开的会话</div>
            <div class="empty-subtitle">从左侧选择好友或群组开始聊天</div>
          </div>
          <form class="composer" id="composer">
            <textarea 
              id="messageInput" 
              rows="1" 
              placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" 
              maxlength="2000"
              autocomplete="off"
            ></textarea>
            <button type="submit" class="primary" id="btnSend">发送</button>
          </form>
        </section>
      </main>
    </div>

    <div id="loginView" class="login">
      <div class="login-card">
        <div class="login-brand">
          <img src="/landing-assets/oldchat_logo.png" alt="旧聊" />
          <div>
            <div class="login-title">欢迎回来</div>
            <div class="login-subtitle">旧聊 Web · 轻量在线聊天</div>
          </div>
        </div>
        <form id="loginForm" class="login-form">
          <label for="loginIdentifier">账号 / 邮箱 / UID</label>
          <input 
            id="loginIdentifier" 
            placeholder="输入用户名或邮箱" 
            autocomplete="username"
            autocapitalize="off"
            required
          />
          <label for="loginPassword">密码</label>
          <input 
            id="loginPassword" 
            type="password" 
            placeholder="输入密码" 
            autocomplete="current-password"
            required
          />
          <button type="submit" class="primary">登录</button>
          <div class="login-hint">首次使用请在手机端注册账号</div>
        </form>
        <div class="login-footer">旧聊 Web 与移动端同账号体系</div>
      </div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    
    <!-- Use optimized version -->
    <script src="/app-assets/app-optimized.js"></script>
  </body>
</html>
